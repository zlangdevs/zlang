name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    name: AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison wget gnupg lsb-release
          codename=$(lsb_release -cs)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/llvm-snapshot.gpg
          printf 'deb http://apt.llvm.org/%s/ llvm-toolchain-%s-22 main\n' \
            "$codename" "$codename" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-22 lld-22 llvm-22-dev
          for t in llc opt lld ld.lld llvm-config; do
            [ -f /usr/bin/${t}-22 ] && sudo ln -sf /usr/bin/${t}-22 /usr/bin/${t} || true
          done
          so=$(find /usr/lib -name 'libLLVM-22.so*' -o -name 'libLLVM.so.22*' 2>/dev/null | sort | tail -1)
          [ -n "$so" ] && sudo ln -sf "$so" /usr/lib/libLLVM-22.so || true

      - name: Build AppImage
        run: zig build appimage

      - name: Upload to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: zig-out/zlang-*.AppImage
          generate_release_notes: true
          body: |
            **Platform support: Linux only** (x86_64 and aarch64 AppImages).

            First release. See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).

      - name: Upload artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: zlang-${{ matrix.arch }}.AppImage
          path: zig-out/zlang-*.AppImage
          retention-days: 7
