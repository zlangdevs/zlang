name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit tests (pure Zig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig build test
        run: zig build test --summary all

  build-and-integration:
    name: Build + integration suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install flex, bison, LLVM/Clang 22
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all
          for t in llc opt clang lld ld.lld lli llvm-config; do
            if ! command -v "$t" >/dev/null; then
              v=$(ls /usr/bin/${t}-22 2>/dev/null || true)
              [ -n "$v" ] && sudo ln -sf "$v" /usr/bin/$t
            fi
          done
          so=$(find /usr/lib -name 'libLLVM-22.so*' -o -name 'libLLVM.so.22*' 2>/dev/null | sort | tail -1)
          echo "libLLVM: $so"
          [ -n "$so" ] && sudo ln -sf "$so" /usr/lib/libLLVM-22.so
          inc=$(llvm-config-22 --includedir 2>/dev/null || echo /usr/lib/llvm-22/include)
          echo "llvm includedir: $inc"
          sudo ln -sf "$inc/llvm-c" /usr/include/llvm-c
          sudo ln -sf "$inc/llvm" /usr/include/llvm
      - name: Build
        run: zig build -Doptimize=ReleaseFast
      - name: Run integration suite (informational)
        continue-on-error: true
        run: ./run_tests.sh
        env:
          ZSTDPATH: ${{ github.workspace }}/stdlib
